<div class="body">
  <div class="container">
  <h1 class="adminHeading">eCommerce Management Portal</h1>
  <br/>
    <div class="row col-md-6 col-md-offset-3 col-sm-8 col-sm-offset-2">
        <div class="panel panel-primary">
            <div class="panel-heading">
                Login To Your Account
            </div><br />
            <div class="panel-body">
               <form (ngSubmit)="onLogin()" #loginForm="ngForm">
                <div  class="input-group">
                    <span class="input-group-addon"><i class="glyphicon glyphicon-user"></i></span>
                    <input type="text" name="username" class="form-control" placeholder="Username" [(ngModel)]="model.username"
                      required/>
                </div>
                <br />
                <div class="input-group">
                    <span class="input-group-addon"><i class="glyphicon glyphicon-lock"></i></span>                       
                    <input type="password" name="password" class="form-control" placeholder="Password"[(ngModel)]="model.password"
                    required
                  />
                </div>
                <br />
                   <div class="row">
                    <div class="col-md-6 col-xs-6">
                        <div class="form-check d-flex align-items: center">
                           <span class="chk-frm">
                            <input type="checkbox" [(ngModel)]="model.rememberMe" name="rememberMe" style="margin: 0;" />  
                                <span>Remember me</span>
                            </span>
                        </div>
                    </div>
                     <div class="col-md-6 col-xs-6">
                        <div class="form-group">
                            <div class="pull-right">
                               <button type="submit" class="btn btn-success">Login</button> 
                            </div><br /><br />
                            <div class="pull-right">
                                <a href="#" class="small">Forgot password ?</a>
                            </div>
                        </div>
                     </div>
                  </div>
               </form>  
                <!-- <button class="btn btn-success"><a href="/dashboard">Login</a></button> -->
            </div>
        </div>
    </div>
  </div>
</div>
